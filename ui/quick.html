<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BoxPassword 빠른 검색</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #11161d;
        --panel-2: #1c232d;
        --line: #2a3340;
        --fg: #e8edf3;
        --fg-dim: #c2cad4;
        --muted: #8c97a3;
        --muted-2: #5e6773;
        --accent: #4f8cff;
        --accent-2: #6ea3ff;
        --danger: #ff8a8a;
        font-family: -apple-system, "SF Pro Text", "Apple SD Gothic Neo",
          "Malgun Gothic", system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100vh; width: 100vw;
        background: var(--bg); color: var(--fg);
        font-size: 13px; overflow: hidden;
        border-radius: 14px;
        border: 1px solid var(--line);
      }
      body { display: flex; flex-direction: column; }
      .q-search {
        width: 100%; padding: 16px 20px;
        background: transparent; border: none; outline: none;
        color: var(--fg); font-size: 17px;
        border-bottom: 1px solid var(--line);
        font-family: inherit;
      }
      .q-search::placeholder { color: var(--muted-2); }
      .q-list { flex: 1; overflow-y: auto; }
      .q-item {
        padding: 10px 18px;
        display: flex; align-items: center; gap: 12px;
        cursor: pointer;
        border-left: 2px solid transparent;
      }
      .q-item:hover { background: var(--panel-2); }
      .q-item.active {
        background: var(--accent);
        color: white;
        border-left-color: var(--accent-2);
      }
      .q-item.active .sub { color: rgba(255,255,255,.85); }
      .q-item .avatar {
        width: 28px; height: 28px; border-radius: 6px;
        background: var(--panel-2);
        display: inline-flex; align-items: center; justify-content: center;
        font-weight: 700; color: var(--fg-dim); font-size: 12px;
      }
      .q-item.active .avatar { background: rgba(255,255,255,.18); color: white; }
      .q-item .title { font-weight: 600; }
      .q-item .sub { color: var(--muted); font-size: 11px; margin-left: auto; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .q-empty {
        padding: 24px 18px; color: var(--muted); text-align: center; font-size: 12px;
      }
      .q-hint {
        padding: 8px 18px; font-size: 11px; color: var(--muted);
        border-top: 1px solid var(--line);
        display: flex; gap: 14px; flex-wrap: wrap;
      }
      kbd {
        background: var(--panel-2); border: 1px solid var(--line);
        border-bottom-width: 2px;
        border-radius: 4px; padding: 1px 6px; font-size: 10px;
        font-family: ui-monospace, Menlo, monospace;
        color: var(--fg-dim);
      }
      .toast {
        position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
        background: var(--panel-2); border: 1px solid var(--line);
        padding: 6px 12px; border-radius: 8px;
        font-size: 11px; opacity: 0; transition: opacity .15s;
      }
      .toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <input class="q-search" id="q" placeholder="제목·사용자명·URL 검색…" autocomplete="off" autofocus />
    <div class="q-list" id="list"></div>
    <div class="q-hint">
      <span><kbd>↑↓</kbd> 이동</span>
      <span><kbd>Enter</kbd> 클립보드 복사</span>
      <span><kbd>Esc</kbd> 닫기</span>
    </div>
    <div class="toast" id="toast"></div>

    <script>
      const t = window.__TAURI__;
      const invoke = (cmd, args) => t.core.invoke(cmd, args);

      let entries = [];
      let visible = [];
      let activeIdx = 0;

      const $ = (id) => document.getElementById(id);
      const escapeHtml = (s) => String(s ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");

      let toastTimer = null;
      function toast(text) {
        const el = $("toast"); el.textContent = text; el.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove("show"), 1500);
      }

      async function reload() {
        try {
          let status = await invoke("vault_status");
          if (!status.unlocked) {
            // Keychain 에 키가 있으면 silently 잠금 해제 시도
            try { await invoke("keychain_try_unlock"); } catch (_) {}
            status = await invoke("vault_status");
          }
          if (!status.unlocked) {
            entries = [];
            $("list").innerHTML = `<div class="q-empty">Vault가 잠겨 있습니다.<br/>메인 창에서 먼저 잠금을 해제하세요.</div>`;
            return;
          }
          entries = await invoke("list_entries");
        } catch (e) {
          $("list").innerHTML = `<div class="q-empty" style="color: var(--danger)">${escapeHtml(String(e))}</div>`;
          return;
        }
        filter($("q").value);
      }

      function filter(q) {
        q = (q || "").trim().toLowerCase();
        visible = entries.filter((e) =>
          !q ||
          (e.title || "").toLowerCase().includes(q) ||
          (e.username || "").toLowerCase().includes(q) ||
          (e.url || "").toLowerCase().includes(q));
        // 최근 사용 우선
        visible.sort((a, b) => (b.updated_at || "").localeCompare(a.updated_at || ""));
        activeIdx = 0;
        render();
      }

      function render() {
        const list = $("list");
        if (!visible.length) {
          list.innerHTML = `<div class="q-empty">${entries.length === 0 ? "표시할 항목이 없습니다" : "검색 결과가 없습니다"}</div>`;
          return;
        }
        list.innerHTML = visible.map((e, i) => {
          const init = (e.title || "?").trim().charAt(0).toUpperCase();
          return `
            <div class="q-item ${i === activeIdx ? "active" : ""}" data-idx="${i}">
              <span class="avatar">${escapeHtml(init)}</span>
              <span class="title">${escapeHtml(e.title)}</span>
              <span class="sub">${escapeHtml(e.username || e.url || "")}</span>
            </div>`;
        }).join("");
        // scroll active into view
        const active = list.querySelector(".q-item.active");
        if (active) active.scrollIntoView({ block: "nearest" });
      }

      async function activateCurrent() {
        const e = visible[activeIdx];
        if (!e) return;
        try {
          await invoke("copy_to_clipboard", { entryId: e.id, delayMs: 30000 });
          toast(`복사됨 — ${e.title}`);
        } catch (err) {
          toast(String(err));
        }
        setTimeout(() => invoke("hide_quick_window"), 250);
      }

      // ----- 이벤트 핸들러 -----
      $("q").addEventListener("input", (e) => filter(e.target.value));

      document.addEventListener("keydown", async (e) => {
        if (e.key === "Escape") { invoke("hide_quick_window"); return; }
        if (e.key === "ArrowDown") {
          e.preventDefault();
          activeIdx = Math.min(visible.length - 1, activeIdx + 1); render();
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          activeIdx = Math.max(0, activeIdx - 1); render();
        } else if (e.key === "Enter") {
          e.preventDefault();
          await activateCurrent();
        }
      });

      $("list").addEventListener("click", async (e) => {
        const item = e.target.closest(".q-item");
        if (!item) return;
        activeIdx = parseInt(item.dataset.idx, 10);
        render();
        await activateCurrent();
      });

      // 윈도우가 보일 때마다 새로 로드
      if (t?.event?.listen) {
        t.event.listen("tauri://focus", () => {
          $("q").value = "";
          reload();
          setTimeout(() => $("q").focus(), 30);
        }).catch(() => {});
      }

      reload();
    </script>
  </body>
</html>
