name: build

# 일반 커밋 / PR 에서는 동작하지 않음.
# 태그(v*) 푸시 또는 수동 dispatch 일 때만 lint → test → 번들 → release 흐름 실행.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────
  # 모든 PR/푸시에 적용되는 라이트 체크.
  # ────────────────────────────────────────────────
  check:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux build deps (tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev
      - uses: Swatinem/rust-cache@v2

      # 포맷·클리피는 정보용 (실패해도 워크플로는 통과). 진짜 결정자는 cargo test.
      - name: rustfmt (informational)
        continue-on-error: true
        run: cargo fmt --check
      - name: clippy (informational)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --no-deps

      # 실제 빌드 + 테스트.
      - name: cargo test
        # Tauri의 그래픽 의존성 때문에 bp-app 통합 테스트는 CI에서 어려움 — 나머지만.
        run: |
          cargo test -p bp-core --no-fail-fast
          cargo test -p bp-crypto --no-fail-fast
          cargo test -p bp-passgen --no-fail-fast
          cargo test -p bp-storage --no-fail-fast
          cargo test -p bp-otp --no-fail-fast

  # ────────────────────────────────────────────────
  # macOS는 .app/.dmg, Windows는 .msi/.exe.
  # 위 트리거(tag / dispatch) 자체가 게이트라 추가 if 불필요.
  # ────────────────────────────────────────────────
  bundle:
    name: bundle (${{ matrix.os }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: macos-intel
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build (Tauri bundle)
        working-directory: crates/bp-app
        env:
          # "-" 는 macOS codesign 의 ad-hoc 서명 표기.
          # 빈 문자열을 넣으면 빈 keychain identity 로 sign 시도되어 실패함.
          APPLE_SIGNING_IDENTITY: "-"
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          set -e
          mkdir -p dist
          # macOS
          find target -type d -name "BoxPassword.app" -exec cp -R {} dist/ \; || true
          find target -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*-setup.exe" \) -exec cp {} dist/ \; || true
          ls -la dist || true

      - uses: actions/upload-artifact@v4
        with:
          name: boxpassword-${{ matrix.artifact }}
          path: dist/**
          if-no-files-found: warn
          retention-days: 14

  # ────────────────────────────────────────────────
  # 태그 푸시 시 GitHub Release 자동 생성.
  # ────────────────────────────────────────────────
  release:
    name: github release
    needs: bundle
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: List artifacts
        run: ls -laR dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.msi
            dist/**/*-setup.exe
          generate_release_notes: true
