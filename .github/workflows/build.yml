name: build

# 일반 커밋 / PR 에서는 동작하지 않음.
# 태그(v*) 푸시 또는 수동 dispatch 일 때만 lint → test → 번들 → release 흐름 실행.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────
  # 위 트리거(tag push / workflow_dispatch) 일 때만 실행.
  # 일반 커밋·PR 에서는 이 job 자체가 시작되지 않음.
  # ────────────────────────────────────────────────
  check:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux build deps (tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev
      - uses: Swatinem/rust-cache@v2

      # 포맷·클리피는 정보용 (실패해도 워크플로는 통과). 진짜 결정자는 cargo test.
      - name: rustfmt (informational)
        continue-on-error: true
        run: cargo fmt --check
      - name: clippy (informational)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --no-deps

      # 실제 빌드 + 테스트.
      - name: cargo test
        # Tauri의 그래픽 의존성 때문에 bp-app 통합 테스트는 CI에서 어려움 — 나머지만.
        run: |
          cargo test -p bp-core --no-fail-fast
          cargo test -p bp-crypto --no-fail-fast
          cargo test -p bp-passgen --no-fail-fast
          cargo test -p bp-storage --no-fail-fast
          cargo test -p bp-otp --no-fail-fast

  # ────────────────────────────────────────────────
  # macOS는 .app/.dmg, Windows는 .msi/.exe.
  # 위 트리거(tag / dispatch) 자체가 게이트라 추가 if 불필요.
  # ────────────────────────────────────────────────
  bundle:
    name: bundle (${{ matrix.os }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M1+) 전용. Intel Mac 은 지원하지 않음.
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ────────────────────────────────────────────────
      # 태그(v*)에서 SemVer 부분만 추출해 Cargo.toml / tauri.conf.json 의
      # version 을 빌드 직전에 덮어씁니다. workflow_dispatch 처럼 태그가
      # 없는 경우엔 기존 파일 값을 그대로 사용.
      # ────────────────────────────────────────────────
      - name: Inject version from tag
        shell: bash
        run: |
          set -e
          REF="${GITHUB_REF##*/}"
          if [[ "$REF" =~ ^v([0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.+-]+)?)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "Injecting version: $VERSION (from tag $REF)"
            VERSION="$VERSION" python3 - <<'PY'
          import os, re
          v = os.environ["VERSION"]
          for path in ["Cargo.toml", "crates/bp-app/tauri.conf.json"]:
              with open(path, "r", encoding="utf-8") as f:
                  src = f.read()
              if path.endswith(".toml"):
                  # [workspace.package] 블록 안의 첫 version = "..." 만 교체.
                  src = re.sub(
                      r'(\[workspace\.package\][^\[]*?version\s*=\s*")[^"]*(")',
                      r'\g<1>' + v + r'\g<2>',
                      src,
                      count=1,
                      flags=re.S,
                  )
              else:
                  # tauri.conf.json 최상단 "version": "..." 한 곳만.
                  src = re.sub(r'("version"\s*:\s*")[^"]*(")', r'\g<1>' + v + r'\g<2>', src, count=1)
              with open(path, "w", encoding="utf-8") as f:
                  f.write(src)
              print(f"  patched {path}")
          PY
          else
            echo "No version tag detected (ref=$REF) — keeping Cargo.toml / tauri.conf.json as-is."
          fi

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build (Tauri bundle)
        working-directory: crates/bp-app
        env:
          # "-" 는 macOS codesign 의 ad-hoc 서명 표기.
          # 빈 문자열을 넣으면 빈 keychain identity 로 sign 시도되어 실패함.
          APPLE_SIGNING_IDENTITY: "-"
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          set -e
          mkdir -p dist
          # macOS
          find target -type d -name "BoxPassword.app" -exec cp -R {} dist/ \; || true
          find target -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*-setup.exe" \) -exec cp {} dist/ \; || true
          ls -la dist || true

      - uses: actions/upload-artifact@v4
        with:
          name: boxpassword-${{ matrix.artifact }}
          path: dist/**
          if-no-files-found: warn
          retention-days: 14

  # ────────────────────────────────────────────────
  # 태그 푸시 시 GitHub Release 자동 생성.
  # ────────────────────────────────────────────────
  release:
    name: github release
    needs: bundle
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: List artifacts
        run: ls -laR dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.msi
            dist/**/*-setup.exe
          generate_release_notes: true
